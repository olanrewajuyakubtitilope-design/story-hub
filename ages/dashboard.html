<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Story Hub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
    <div class="logo">📚 Story Hub</div>

    <nav>
        <a href="../index.html">Home</a>
        <a href="read.html">Browse</a>
        <a href="publish.html">Publish</a>
        <a href="login.html">Logout</a>
    </nav>
</header>

<section class="dashboard">

    <h1>Author Dashboard</h1>

    <div class="stats">

        <div class="stat-card">
            <h2>12</h2>
            <p>Stories</p>
        </div>

        <div class="stat-card">
            <h2>52,310</h2>
            <p>Total Views</p>
        </div>

        <div class="stat-card">
            <h2>8,425</h2>
            <p>Likes</p>
        </div>

        <div class="stat-card">
            <h2>623</h2>
            <p>Comments</p>
        </div>

    </div>

    <div class="dashboard-header">
        <h2>My Stories</h2>

        <a href="publish.html" class="new-story-btn">
            + New Story
        </a>
    </div>

    <table>

        <tr>
            <th>Title</th>
            <th>Genre</th>
            <th>Status</th>
            <th>Views</th>
            <th>Actions</th>
        </tr>

        <tr>
            <td>The Lost Kingdom</td>
            <td>Fantasy</td>
            <td>Published</td>
            <td>24,521</td>

            <td>
                <button>Edit</button>
                <button>Delete</button>
            </td>

        </tr>

        <tr>
            <td>Forever Yours</td>
            <td>Romance</td>
            <td>Draft</td>
            <td>0</td>

            <td>
                <button>Edit</button>
                <button>Delete</button>
            </td>

        </tr>

    </table>

</section>

<footer>
    <p>© 2026 Story Hub. All rights reserved.</p>
</footer>

<script src="../script.js"></script>

</body>
</html>
