<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish Story - Story Hub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
    <div class="logo">📚 Story Hub</div>

    <nav>
        <a href="../index.html">Home</a>
        <a href="read.html">Stories</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
    </nav>
</header>

<section class="publish-page">

    <h1>Publish a New Story</h1>
    <p>Share your imagination with readers around the world.</p>

    <form class="publish-form">

        <label>Story Title</label>
        <input type="text" placeholder="Enter story title">

        <label>Genre</label>
        <select>
            <option>Fantasy</option>
            <option>Romance</option>
            <option>Adventure</option>
            <option>Mystery</option>
            <option>Horror</option>
            <option>Science Fiction</option>
            <option>Drama</option>
        </select>

        <label>Short Description</label>
        <textarea rows="4" placeholder="Tell readers what your story is about..."></textarea>

        <label>Cover Image</label>
        <input type="file">

        <label>Story Content</label>
        <textarea rows="18" placeholder="Start writing your story here..."></textarea>

        <div class="publish-buttons">
            <button class="draft-btn" type="button">💾 Save Draft</button>
            <button class="publish-btn" type="submit">🚀 Publish Story</button>
        </div>

    </form>

</section>

<footer>
    <p>© 2026 Story Hub. All rights reserved.</p>
</footer>

<script src="../script.js"></script>

</body>
</html>
